<div class="w-full {{ include.padding_class | default: 'pt-3' }}">
  <div class="grid gap-4 md:grid-cols-[190px_minmax(0,1fr)] md:gap-6 md:items-center">
    <div class="cv-divider self-center translate-y-[7px]"></div>
    <div class="flex min-w-0 items-center gap-6">
      <h2 class="m-0 shrink-0 leading-none text-3xl font-semibold text-[#2f3e9d]">{{ include.title }}</h2>
      <div class="cv-divider self-center translate-y-[7px] flex-1"></div>
    </div>
    {% if include.description %}
      <p class="text-sm italic text-[#8a816f] md:col-start-2">{{ include.description }}</p>
    {% endif %}
  </div>
</div>
