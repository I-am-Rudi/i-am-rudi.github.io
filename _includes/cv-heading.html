<div class="w-full max-w-2xl {{ include.padding_class | default: 'pt-3' }}">
  <div class="divider"></div>
  <h2 class="mt-2 text-3xl font-semibold text-[#2f3e9d]">{{ include.title }}</h2>
  {% if include.description %}
    <p class="text-sm italic text-[#8a816f]">{{ include.description }}</p>
  {% endif %}
</div>
