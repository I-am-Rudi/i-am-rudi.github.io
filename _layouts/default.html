<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light;
      }

      body {
        font-family: "JetBrains Mono", monospace;
        background-color: #f7f1e7;
        color: #3f3527;
        background-image:
          linear-gradient(rgba(167, 145, 112, 0.14) 1px, transparent 1px),
          linear-gradient(90deg, rgba(167, 145, 112, 0.14) 1px, transparent 1px);
        background-size: 24px 24px;
      }

      h1, h2, h3, h4, h5, h6 {
        color: #2e2619;
      }

      .content a {
        color: #2f3e9d;
        text-decoration: underline;
      }

      .content {
        line-height: 1.6;
      }

      .content h1 {
        font-size: 2.25rem;
        line-height: 1.2;
        margin-top: 0.5rem;
        margin-bottom: 1rem;
        color: #2f3e9d;
      }

      .content h2 {
        margin-top: 1.6rem;
        margin-bottom: 0.6rem;
        font-size: 1.45rem;
        font-weight: 700;
      }

      .content h3 {
        margin-top: 1.2rem;
        margin-bottom: 0.35rem;
        font-size: 1.1rem;
        font-weight: 700;
      }

      .content p,
      .content ul,
      .content ol,
      .content blockquote,
      .content table,
      .content pre {
        margin-top: 0.75rem;
        margin-bottom: 0.75rem;
      }

      .content ul,
      .content ol {
        padding-left: 1.25rem;
      }

      .content li {
        margin: 0.2rem 0;
      }

      .content hr {
        border: 0;
        border-top: 1px solid #d4c6ad;
      }

      .content blockquote {
        border-left: 3px solid #92805f;
        padding-left: 0.8rem;
        color: #5b4f3a;
      }

      .content code {
        background: #efe5d2;
        border: 1px solid #d9caaf;
        border-radius: 4px;
        padding: 0.05rem 0.35rem;
        color: #1f3f89;
      }

      .content pre {
        background: #f6eee0;
        border: 1px solid #ded0b8;
        border-radius: 8px;
        padding: 0.9rem;
        overflow-x: auto;
      }

      .content pre code {
        background: transparent;
        border: 0;
        padding: 0;
        color: inherit;
      }

      .content table {
        width: 100%;
        border-collapse: collapse;
      }

      .content th,
      .content td {
        border: 1px solid #d4c6ad;
        padding: 0.45rem;
        text-align: left;
      }

      .content > :first-child {
        margin-top: 0;
      }

      .markdown-page .content {
        max-width: 860px;
        margin: 0 auto;
        border: 1px solid #d8cab0;
        background: #fcf9f3;
        padding: 2.2rem;
      }

      .markdown-page .content h2 {
        border-bottom: 2px solid #2f3e9d;
        padding-bottom: 0.2rem;
      }

      .markdown-page .content ul {
        list-style: disc;
      }

      .markdown-page .content ol {
        list-style: decimal;
      }

      .cv-divider {
        border-top: 3px solid #2f3e9d;
      }

      .cv-meta {
        color: #6f6656;
      }

      .cv-item {
        display: grid;
        grid-template-columns: 140px 1fr;
        gap: 1rem;
        margin-top: 0.9rem;
      }

      .cv-date {
        color: #6f6656;
      }

      @media (max-width: 700px) {
        .cv-item {
          grid-template-columns: 1fr;
          gap: 0.35rem;
        }
      }
    </style>
  </head>
  <body class="min-h-screen antialiased {% if page.layout == 'post' %}markdown-page{% endif %}">
    <div class="mx-auto min-h-screen w-full max-w-5xl border-x border-[#d8cab0] bg-[#fcf8f1]/92">
      <header class="border-b border-[#cfbfa1] px-6 py-4 text-xs uppercase tracking-widest text-[#6f6656]">
        <div class="flex items-center justify-between gap-4">
          <nav class="flex items-center gap-4">
            <a href="{{ '/' | relative_url }}" class="no-underline {% if page.url == '/' %}text-[#2f3e9d]{% endif %}">HOME</a>
            <a href="{{ '/cv/' | relative_url }}" class="no-underline {% if page.url == '/cv/' %}text-[#2f3e9d]{% endif %}">CV</a>
            <a href="{{ '/blog/' | relative_url }}" class="no-underline {% if page.url == '/blog/' or page.layout == 'post' %}text-[#2f3e9d]{% endif %}">BLOG</a>
          </nav>
          <div class="flex items-center gap-2">
            <span class="inline-block h-2 w-2 border border-[#96896f] bg-[#2f3e9d]"></span>
            <span>PROFILE ONLINE</span>
          </div>
        </div>
      </header>
      <main class="content px-6 py-10">
        {{ content }}
      </main>
    </div>
  </body>
</html>
